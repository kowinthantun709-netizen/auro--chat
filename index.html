<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostAce2011 Chat - Updated</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; }
        .auth-box { background: white; padding: 25px; border-radius: 15px; color: #333; width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        /* Chat UI */
        #chat-page { display: none; flex-direction: column; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Styles */
        .message { padding: 10px 14px; border-radius: 12px; max-width: 85%; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); align-self: flex-start; position: relative; word-wrap: break-word; }
        .admin-msg { background: #fff8e1; border: 2px solid #ffd700; align-self: center; text-align: center; width: 90%; color: #333; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        
        .user-name { font-weight: bold; font-size: 12px; display: block; margin-bottom: 4px; color: #128c7e; }
        .admin-label { color: #b8860b; font-weight: bold; display: block; margin-bottom: 4px; }
        
        .del-btn { color: #ff4444; font-size: 18px; cursor: pointer; float: right; margin-left: 10px; border: none; background: none; line-height: 1; }

        .input-bar { background: #f0f0f0; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #ddd; }
        #msgInput { flex: 1; border-radius: 25px; border: 1px solid #ccc; padding: 12px 18px; font-size: 16px; outline: none; }
        .send-btn { background: #075e54; color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .send-btn:hover { background: #128c7e; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="text-align:center; color:#075e54; margin-top:0;">GhostAce2011</h2>
        <input type="email" id="emailInput" placeholder="Email (အီးမေးလ်)" style="padding:10px; border:1px solid #ddd; border-radius:5px;">
        <input type="password" id="passInput" placeholder="Password (စကားဝှက်)" style="padding:10px; border:1px solid #ddd; border-radius:5px;">
        <button onclick="login()" style="background:#075e54; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Login ဝင်မည်</button>
        <button onclick="signup()" style="background:#25d366; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">အကောင့်သစ်ဖွင့်ရန်</button>
    </div>
</div>

<div id="chat-page">
    <div class="header">
        <span>GhostAce2011 Chat</span>
        <button onclick="logout()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
    </div>
    <div id="chat-container"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

  // သင့်ရဲ့ အသစ်ပေးထားတဲ့ Config
  const firebaseConfig = {
    apiKey: "AIzaSyB_IdBe27bNVBOh_cBlC-BRQrHdwHrznpE",
    authDomain: "demon-chat-20361.firebaseapp.com",
    databaseURL: "https://demon-chat-20361-default-rtdb.firebaseio.com",
    projectId: "demon-chat-20361",
    storageBucket: "demon-chat-20361.firebasestorage.app",
    messagingSenderId: "563979701938",
    appId: "1:563979701938:web:6874cdb5abffb3f24ec3ab",
    measurementId: "G-T9RGFQ6BC6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const analytics = getAnalytics(app);
  let currentUser = null;

  // Auth Functions
  window.login = () => {
    const e = document.getElementById('emailInput').value;
    const p = document.getElementById('passInput').value;
    if(!e || !p) return alert("Email နှင့် Password ဖြည့်ပါ။");
    signInWithEmailAndPassword(auth, e, p).catch(err => alert("အမှား: " + err.message));
  };

  window.signup = () => {
    const e = document.getElementById('emailInput').value;
    const p = document.getElementById('passInput').value;
    if(!e || !p) return alert("Email နှင့် Password ဖြည့်ပါ။");
    createUserWithEmailAndPassword(auth, e, p).then(() => alert("အကောင့်ဖွင့်ပြီးပါပြီ")).catch(err => alert(err.message));
  };

  window.logout = () => signOut(auth).then(() => location.reload());

  // Auth State
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('chat-page').style.display = 'flex';
      initChat();
    }
  });

  function initChat() {
    const messagesRef = ref(db, 'chat_messages');
    const container = document.getElementById('chat-container');
    const msgInput = document.getElementById('msgInput');

    // Send Message Function
    const handleSendMessage = () => {
      const text = msgInput.value;
      if(text.trim()) {
        push(messagesRef, {
          email: currentUser.email,
          text: text,
          isAdmin: currentUser.email === "thoonnz8888@gmail.com",
          timestamp: Date.now()
        });
        msgInput.value = "";
      }
    };

    document.getElementById('sendBtn').onclick = handleSendMessage;

    // Enter Key Support
    msgInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleSendMessage();
    });

    // Show Messages
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      const id = snapshot.key;
      const div = document.createElement('div');
      div.id = id;
      
      const isAdminUser = (currentUser.email === "thoonnz8888@gmail.com");
      const isMyMsg = (msg.email === currentUser.email);

      // Create inner elements to prevent XSS (Security)
      let contentHtml = "";
      if(isAdminUser) {
          contentHtml += `<button class="del-btn" onclick="deleteMessage('${id}')">×</button>`;
      }

      if(msg.isAdmin) {
        div.className = "message admin-msg";
        contentHtml += `<span class="admin-label">👑 Admin (Thoon)</span>`;
      } else {
        div.className = "message " + (isMyMsg ? "my-msg" : "");
        contentHtml += `<span class="user-name">${msg.email.split('@')[0]}</span>`;
      }

      div.innerHTML = contentHtml;
      const textNode = document.createTextNode(msg.text); // Secure text
      div.appendChild(textNode);

      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    });

    onChildRemoved(messagesRef, (snapshot) => {
      const el = document.getElementById(snapshot.key);
      if(el) el.remove();
    });

    window.deleteMessage = (id) => {
      if(confirm("ဒီစာကို ဖျက်မှာ သေချာလား?")) {
        remove(ref(db, 'chat_messages/' + id));
      }
    };
  }
</script>
</body>
</html>
